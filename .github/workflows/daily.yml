name: ASO daily

# On-demand only: runs the monitoring pass in the cloud, commits ONLY the
# updated history DB back to the repo, and deploys the freshly built dashboard
# to GitHub Pages. The generated HTML/reports are gitignored (rebuilt every
# run), so the sole committed artifact is aso_history.db — that's what keeps
# this conflict-free. Pages source must be set to "GitHub Actions"
# (Settings → Pages). No secrets needed — the tool only calls Apple's public
# API and has no dependencies.

on:
  workflow_dispatch:           # run from the Actions tab
    inputs:
      mode:
        description: "pass = fetch fresh data + rebuild; report = rebuild report only (no API calls, keeps current diff window)"
        default: "pass"
        type: choice
        options: ["pass", "report"]

permissions:
  contents: write              # commit the history DB
  pages: write                 # deploy the dashboard to Pages
  id-token: write              # required by deploy-pages

concurrency:
  group: aso-write             # never let daily + keyword scans push at once
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run
        run: |
          if [ "${{ inputs.mode }}" = "report" ]; then
            python3 aso_monitor.py report      # rebuild from history, no API calls
          else
            python3 aso_monitor.py             # full pass
          fi

      - name: Commit history DB
        run: |
          git config user.name  "aso-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aso_history.db
          git commit -m "ASO daily $(date -u +%F) [skip ci]" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp aso_report_*.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Publish the built dashboard to GitHub Pages.
  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
