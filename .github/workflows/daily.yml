name: ASO daily

# Runs the daily monitoring pass in the cloud, commits ONLY the updated history
# DB back to the repo, and deploys the freshly built dashboard to GitHub Pages.
# The generated HTML/reports are gitignored (rebuilt every run), so the sole
# committed artifact is aso_history.db — that's what keeps this conflict-free.
# Pages source must be set to "GitHub Actions" (Settings → Pages). No secrets
# needed — the tool only calls Apple's public API and has no dependencies.

on:
  schedule:
    # GitHub cron is UTC-only and DST-unaware. 07:00 Dublin is 06:00 UTC in
    # summer (IST, UTC+1) and 07:00 UTC in winter (GMT). Trigger at both and let
    # the `gate` job below run only when it is actually 07:00 in Dublin, so the
    # pass fires exactly once per day at 7am local time year-round. Minute is
    # offset off the top of the hour to dodge GitHub's :00 scheduling congestion.
    - cron: "7 6 * * *"      # 07:07 Dublin during IST (summer)
    - cron: "7 7 * * *"      # 07:07 Dublin during GMT (winter)
  workflow_dispatch:           # also runnable on-demand from the Actions tab
    inputs:
      mode:
        description: "pass = fetch fresh data + rebuild; report = rebuild report only (no API calls, keeps current diff window)"
        default: "pass"
        type: choice
        options: ["pass", "report"]

permissions:
  contents: write              # commit the history DB
  pages: write                 # deploy the dashboard to Pages
  id-token: write              # required by deploy-pages

concurrency:
  group: aso-write             # never let daily + keyword scans push at once
  cancel-in-progress: false

jobs:
  # Scheduled runs fire at both 06:07 and 07:07 UTC (see cron note above); only
  # the one matching 07:00 Dublin proceeds. Manual dispatch always proceeds.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Dublin date +%H)" = "07" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Dublin time is $(TZ=Europe/Dublin date +%H:%M) — not 07:00, skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run
        run: |
          if [ "${{ inputs.mode }}" = "report" ]; then
            python3 aso_monitor.py report      # rebuild from history, no API calls
          else
            python3 aso_monitor.py             # full pass (scheduled runs land here)
          fi

      - name: Commit history DB
        run: |
          git config user.name  "aso-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aso_history.db
          git commit -m "ASO daily $(date -u +%F) [skip ci]" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp aso_report_*.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Publish the built dashboard to GitHub Pages. Skipped automatically when the
  # gate skips the run job.
  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
