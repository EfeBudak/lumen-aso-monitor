name: ASO keyword scan

# On-demand only: the heavy demand + winnability scan that refreshes the
# "Where to focus" section. Run it from the Actions tab when you want fresh
# keyword targets (weekly/biweekly is plenty). Not part of the daily job.

on:
  workflow_dispatch:
    inputs:
      countries:
        description: "Space-separated storefronts to scan (blank = each app's own markets)"
        default: ""

permissions:
  contents: write              # commit the history DB
  pages: write                 # deploy the dashboard to Pages
  id-token: write              # required by deploy-pages

concurrency:
  group: aso-write             # shares the lock with the daily job
  cancel-in-progress: false

jobs:
  gap:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Scans every app (Lumen, Rock Identifier, A Star Shot, Before After),
      # each across its own markets — or only the storefronts named in the
      # `countries` input.
      - name: Run gap scans
        run: python3 aso_monitor.py gap all ${{ inputs.countries }}

      - name: Rebuild dashboard
        run: python3 aso_monitor.py report

      - name: Commit history DB
        run: |
          git config user.name  "aso-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aso_history.db
          git commit -m "ASO keyword scan $(date -u +%F) [skip ci]" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp aso_report_*.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: gap
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
